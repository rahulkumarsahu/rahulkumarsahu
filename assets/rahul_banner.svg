<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#121226"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="58%" r="40%">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.75"/>
      <stop offset="45%" stop-color="#7b61ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#b7b7ff" stroke-opacity="0.08" stroke-width="2"/>
    </pattern>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="38" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="38" fill="url(#grid)"/>

  <circle cx="800" cy="580" r="300" fill="#7b61ff" opacity="0.35" filter="url(#blur)"/>
  <circle cx="800" cy="580" r="220" fill="#9d84ff" opacity="0.18" filter="url(#blur)"/>
  <rect x="280" y="180" width="1040" height="540" rx="28" fill="#ffffff" opacity="0.02" stroke="#cfc8ff" stroke-opacity="0.08"/>

